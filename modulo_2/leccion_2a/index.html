<!DOCTYPE html><!-- Declaracion que le dice al navegador que el documento es HTML5 -->

<html lang="en"> <!-- Es la raiz del documento. Contiene todo el codigo de la pagina -->


<head> <!-- Etiqueta que contiene metadatos, no es visible para el usuario -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi página web</title>
</head>

<body> <!-- Cuerpo de la página web, todo lo que se escribe dentro, será lo que el usuario podrá ver -->

    <header> <!-- Representa la cabecera de la página, suele contener el logo, el titulo principal o el menu de navegacion -->

        <h1></h1> <!-- Es el encabezado o titulo, solo debe haber uno por página -->
        
    </header>

    <main> <!-- Representa el contenido dominante y central de un documento -->

        <section> <!-- Define una seccion generica y tematica dentro del documento -->

            <aside> <!-- Representa contenido relaciona de forma indirecto con el conteni principal, se usa comunmente para barras laterales -->

            </aside>

            <article> <!-- Se usa para contenido que tiene sentido por si mismo, y que podria ser de forma independiente, como una noticia, un post o un comentario -->

            </article>

        </section>

    </main>

    <footer> <!-- Es el pie de pagina, se suele colocar informacion de autoria, enlaces, redes sociales -->

    </footer>

</body>

</html>
